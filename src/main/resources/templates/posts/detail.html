<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .content { margin: 20px 0; line-height: 1.8; white-space: pre-wrap; }
        .actions { margin-top: 30px; display: flex; gap: 10px; }
        a.btn { display: inline-block; padding: 8px 16px; background: #0066cc; color: white; border-radius: 4px; text-decoration: none; }
        button.btn-delete { padding: 8px 16px; background: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a.btn-back { display: inline-block; padding: 8px 16px; background: #888; color: white; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>
    <h1 th:text="${post.title}"></h1>
    <div class="content" th:text="${post.content}"></div>

    <div class="actions">
        <a class="btn-back" th:href="@{/web/posts}">목록</a>
        <a class="btn" th:href="@{/web/posts/{id}/edit(id=${post.id})}">수정</a>
        <form th:action="@{/web/posts/{id}/delete(id=${post.id})}" method="post"
              onsubmit="return confirm('삭제하시겠습니까?')">
            <button class="btn-delete" type="submit">삭제</button>
        </form>
    </div>
</body>
</html>
