<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin: 16px 0; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type=text], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 200px; resize: vertical; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        button[type=submit] { padding: 10px 24px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        a.btn-back { display: inline-block; padding: 10px 24px; background: #888; color: white; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>
    <h1>글 수정</h1>
    <form th:action="@{/web/posts/{id}/edit(id=${post.id})}" method="post">
        <div class="form-group">
            <label>제목</label>
            <input type="text" name="title" th:value="${post.title}" required>
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea name="content" required th:text="${post.content}"></textarea>
        </div>
        <div class="actions">
            <a class="btn-back" th:href="@{/web/posts/{id}(id=${post.id})}">취소</a>
            <button type="submit">저장</button>
        </div>
    </form>
</body>
</html>
